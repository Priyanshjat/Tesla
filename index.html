<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <nav>
            <div id="logo">
                <h2>TESLA</h2>
            </div>
            <div id="mid-list">
                <ul>
                    <li><a href="">Vehicles</a></li>
                    <li><a href="">Energy</a></li>
                    <li><a href="">Charging</a></li>
                    <li><a href="">Discover</a></li>
                    <li><a href="">Shop</a></li>
                </ul>
            </div>
            <div id="last-part">
                <i class="fa-regular fa-circle-question" style="color: rgb(7, 7, 7);"></i>
                <i class="fa-solid fa-globe" style="color: rgb(7, 7, 7);"></i>
                <i class="fa-regular fa-circle-user" style="color: rgb(7, 7, 7);"></i>
            </div>
        </nav>

        <div id="hero-section">
            <input type="radio" name="slide" id="s1" checked>
            <input type="radio" name="slide" id="s2">
            <input type="radio" name="slide" id="s3">
            <div id="slider">
                <video src="./assets/herovideo.webm" autoplay muted loop></video>
                <img src="./assets/2nd.png" alt="">
                <img src="./assets/3rd.png" alt="">
            </div>

             <div id="nav">
            <label for="s3" class="prev">〈</label>
            <label for="s2" class="next">〉</label>
            <label for="s1" class="prev">〈</label>
            <label for="s3" class="next">〉</label>
            <label for="s2" class="prev">〈</label>
            <label for="s1" class="next">〉</label>
        </div>
        </div>

    </header>
    <main>
        <div class="main-section">

            <input type="radio" name="slid" id="sl1" checked>
            <input type="radio" name="slid" id="sl2">
            <input type="radio" name="slid" id="sl3">
            <input type="radio" name="slid" id="sl4">
            <input type="radio" name="slid" id="sl5">

            <div class="slider">
                <img src="./assets/main/slide1.png" alt="">
                <img src="./assets/main/slide2.png" alt="">
                <img src="./assets/main/slide3.png" alt="">
                <img src="./assets/main/slide4.png" alt="">
                <img src="./assets/main/slide5.png" alt="">
            </div>
           
             <div class="nav">
            <label for="sl2" class="nex">〉</label>
            <label for="sl1" class="pre">〈</label>
            <label for="sl3" class="nex">〉</label>
            <label for="sl2" class="pre">〈</label>
            <label for="sl4" class="nex">〉</label>
            <label for="sl3" class="pre">〈</label>
            <label for="sl5" class="nex">〉</label>
            <label for="sl4" class="pre">〈</label>
            
        </div>

        </div>

        
    </main>
    <footer></footer>
</body>

</html>
